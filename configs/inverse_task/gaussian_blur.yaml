lgvd_config:
  num_steps: 100
  lr: 1e-4
  tau: 0.01
  lr_min_ratio: 0.01

admm_config:
  daps:
    beta_y: 0.01
    eta0: 2.0e-5      # task-dependent; paper tunes per task
    delta: 1.0e-2
    inner_steps: 100
    prior_mean: ode
    data_term: mse
    r_ratio: 1.0
    r_min: 1.0e-3
    clip: false        # explicit projection to [-1,1] (toggle if you want “pure” algorithm)
  max_iter: 220
  rho: 100
  eta: 0.99
  gamma: 1
  low_t_patience: 40
  delta_tol: 1e-10
  delta_patience: 10
  init_factor:
    x: 0.01
    z: 0.01
    u: 0
  ml:
    max_iter: 1000
    lr: 5.0e-2
    tol: 1.0e-1
    optimizer: Adam
    clip: False
    lr_decay: 1.3
    lr_min: 1.0e-25
    patience: 3
    verbose: False
  denoise:
    type: denoise
    final_step: ode
    t_window_max: 10
    t_window_min: 3
    t_minimum: 20
    lgvd:
      reg_factor: 100
      num_steps: 10
      lr: 5.0e-4
    diffusion:
      beta_start: 0.0001
      beta_end: 0.02
      T: 1000
  dys:
    gamma: 0.1
    lambda_schedule:
      activate: true
      start: 0.2
      end: 1.0
      warmup: 50

  pdhg:
    # ----- Step sizes (stability ~ tau * sigma_dual * ||K||^2 < 1)
    # With norm="ortho" FFT and padding/cropping, ||K|| ~ 1, so start around 0.5–0.9.
    tau: 0.01
    sigma_dual: 150

    # ----- Extrapolation (theta in [0,1]; 1.0 is common)
    theta_schedule:
      activate: false
      start: 0.0
      end: 0.0
      warmup: 50

    # ----- Practical stabilizers
    use_box_proj: true        # clamp to [-1,1] after denoise
    proj_min: -1.0            # optional override; otherwise uses admm_config.proj.*
    proj_max: 1.0

    # ----- Data fidelity parameters for phase retrieval
    # Usually take from operator.sigma (0.05), but you can override.
    sigma_n: 0.05

    # ----- Dual initialization
    init_dual: zeros          # "zeros" or "noise"
operator:
  name: gaussian_blur
  kernel_size: 61
  intensity: 3.0
  sigma: 0.05
